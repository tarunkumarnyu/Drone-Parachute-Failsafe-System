<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 580" font-family="'Times New Roman', 'DejaVu Serif', Georgia, serif">

  <rect width="720" height="580" fill="#ffffff"/>

  <!-- Title -->
  <text x="360" y="38" text-anchor="middle" fill="#000" font-size="14" font-weight="bold">System Architecture of the Multi-Cog Parallax Propeller (P8X32A) Flight Controller</text>

  <!-- ════════ MCU boundary ════════ -->
  <rect x="30" y="64" width="660" height="260" fill="#fafafa" stroke="#444" stroke-width="1.5" stroke-dasharray="8 4"/>
  <text x="48" y="82" fill="#444" font-size="11" font-style="italic">P8X32A Microcontroller</text>

  <!-- ──── Cog 0 ──── -->
  <rect x="50" y="96" width="190" height="130" fill="#eef4fc" stroke="#3b7dd8" stroke-width="1.2"/>
  <rect x="50" y="96" width="190" height="24" fill="#3b7dd8"/>
  <text x="145" y="113" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">Cog 0 – Main Loop</text>
  <text x="60" y="138" fill="#1a1a1a" font-size="10">• Read shared sensor flags</text>
  <text x="60" y="154" fill="#1a1a1a" font-size="10">• Evaluate deploy conditions</text>
  <text x="60" y="170" fill="#1a1a1a" font-size="10">• Actuate chute servo (P2)</text>
  <text x="60" y="186" fill="#1a1a1a" font-size="10">• Actuate gear servo (P4)</text>
  <text x="60" y="202" fill="#1a1a1a" font-size="10">• Inter-cog coordination</text>

  <!-- ──── Cog 1 ──── -->
  <rect x="265" y="96" width="190" height="130" fill="#eef8ef" stroke="#2e8b3e" stroke-width="1.2"/>
  <rect x="265" y="96" width="190" height="24" fill="#2e8b3e"/>
  <text x="360" y="113" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">Cog 1 – Ultrasonic</text>
  <text x="275" y="138" fill="#1a1a1a" font-size="10" font-style="italic">measure_distance()</text>
  <text x="275" y="158" fill="#1a1a1a" font-size="10">• HC-SR04 trigger/echo</text>
  <text x="275" y="174" fill="#1a1a1a" font-size="10">• Time-of-flight → distance</text>
  <text x="275" y="190" fill="#1a1a1a" font-size="10">• Write shared var: distance</text>
  <text x="275" y="206" fill="#1a1a1a" font-size="10">• Continuous sampling</text>

  <!-- ──── Cog 2 ──── -->
  <rect x="480" y="96" width="190" height="130" fill="#f3eefa" stroke="#7c4dbd" stroke-width="1.2"/>
  <rect x="480" y="96" width="190" height="24" fill="#7c4dbd"/>
  <text x="575" y="113" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">Cog 2 – IMU Reader</text>
  <text x="490" y="138" fill="#1a1a1a" font-size="10" font-style="italic">read_imu()</text>
  <text x="490" y="158" fill="#1a1a1a" font-size="10">• MPU-6050 I²C polling</text>
  <text x="490" y="174" fill="#1a1a1a" font-size="10">• Z-axis accel. sampling</text>
  <text x="490" y="190" fill="#1a1a1a" font-size="10">• Jerk (da/dt) computation</text>
  <text x="490" y="206" fill="#1a1a1a" font-size="10">• Set flag: jerk_detected</text>

  <!-- ──── Shared Hub RAM ──── -->
  <rect x="50" y="248" width="620" height="32" fill="#f0f0f0" stroke="#666" stroke-width="1"/>
  <text x="360" y="269" text-anchor="middle" fill="#222" font-size="11" font-weight="bold">Shared Hub RAM</text>

  <!-- Cog → Hub connections (colored) -->
  <line x1="145" y1="226" x2="145" y2="248" stroke="#3b7dd8" stroke-width="1.2"/>
  <polygon points="145,248 142,242 148,242" fill="#3b7dd8"/>
  <text x="155" y="240" fill="#3b7dd8" font-size="8" font-weight="bold">R/W</text>

  <line x1="360" y1="226" x2="360" y2="248" stroke="#2e8b3e" stroke-width="1.2"/>
  <polygon points="360,248 357,242 363,242" fill="#2e8b3e"/>
  <text x="370" y="240" fill="#2e8b3e" font-size="8" font-weight="bold">W</text>

  <line x1="575" y1="226" x2="575" y2="248" stroke="#7c4dbd" stroke-width="1.2"/>
  <polygon points="575,248 572,242 578,242" fill="#7c4dbd"/>
  <text x="585" y="240" fill="#7c4dbd" font-size="8" font-weight="bold">W</text>

  <!-- ════════ GPIO Pin Row ════════ -->
  <text x="360" y="310" text-anchor="middle" fill="#333" font-size="10" font-style="italic">GPIO Pin Assignment</text>
  <line x1="50" y1="316" x2="670" y2="316" stroke="#999" stroke-width="0.5"/>

  <!-- Pin labels -->
  <text x="100" y="336" text-anchor="middle" fill="#7c4dbd" font-size="10" font-weight="bold">P0, P1</text>
  <text x="100" y="350" text-anchor="middle" fill="#555" font-size="9">(I²C SDA/SCL)</text>

  <text x="310" y="336" text-anchor="middle" fill="#2e8b3e" font-size="10" font-weight="bold">P3</text>
  <text x="310" y="350" text-anchor="middle" fill="#555" font-size="9">(Trigger/Echo)</text>

  <text x="490" y="336" text-anchor="middle" fill="#3b7dd8" font-size="10" font-weight="bold">P2</text>
  <text x="490" y="350" text-anchor="middle" fill="#555" font-size="9">(PWM)</text>

  <text x="620" y="336" text-anchor="middle" fill="#3b7dd8" font-size="10" font-weight="bold">P4</text>
  <text x="620" y="350" text-anchor="middle" fill="#555" font-size="9">(PWM)</text>

  <!-- Lines to peripherals (colored) -->
  <line x1="100" y1="356" x2="100" y2="392" stroke="#7c4dbd" stroke-width="1"/>
  <polygon points="100,392 97,386 103,386" fill="#7c4dbd"/>

  <line x1="310" y1="356" x2="310" y2="392" stroke="#2e8b3e" stroke-width="1"/>
  <polygon points="310,392 307,386 313,386" fill="#2e8b3e"/>

  <line x1="490" y1="356" x2="490" y2="392" stroke="#3b7dd8" stroke-width="1"/>
  <polygon points="490,392 487,386 493,386" fill="#3b7dd8"/>

  <line x1="620" y1="356" x2="620" y2="392" stroke="#3b7dd8" stroke-width="1"/>
  <polygon points="620,392 617,386 623,386" fill="#3b7dd8"/>

  <!-- ════════ Peripherals ════════ -->

  <!-- IMU -->
  <rect x="40" y="396" width="120" height="56" fill="#f3eefa" stroke="#7c4dbd" stroke-width="1"/>
  <text x="100" y="416" text-anchor="middle" fill="#1a1a1a" font-size="11" font-weight="bold">MPU-6050</text>
  <text x="100" y="432" text-anchor="middle" fill="#555" font-size="9">6-Axis IMU</text>
  <text x="100" y="444" text-anchor="middle" fill="#555" font-size="9">Addr: 0x68</text>

  <!-- Ultrasonic -->
  <rect x="250" y="396" width="120" height="56" fill="#eef8ef" stroke="#2e8b3e" stroke-width="1"/>
  <text x="310" y="416" text-anchor="middle" fill="#1a1a1a" font-size="11" font-weight="bold">HC-SR04</text>
  <text x="310" y="432" text-anchor="middle" fill="#555" font-size="9">Ultrasonic Ranger</text>
  <text x="310" y="444" text-anchor="middle" fill="#555" font-size="9">Range: 2–400 cm</text>

  <!-- Chute Servo -->
  <rect x="430" y="396" width="120" height="56" fill="#eef4fc" stroke="#3b7dd8" stroke-width="1"/>
  <text x="490" y="416" text-anchor="middle" fill="#1a1a1a" font-size="11" font-weight="bold">Servo (Chute)</text>
  <text x="490" y="432" text-anchor="middle" fill="#555" font-size="9">Parachute Deploy</text>
  <text x="490" y="444" text-anchor="middle" fill="#555" font-size="9">50 Hz PWM</text>

  <!-- Gear Servo -->
  <rect x="560" y="396" width="120" height="56" fill="#eef4fc" stroke="#3b7dd8" stroke-width="1"/>
  <text x="620" y="416" text-anchor="middle" fill="#1a1a1a" font-size="11" font-weight="bold">Servo (Gear)</text>
  <text x="620" y="432" text-anchor="middle" fill="#555" font-size="9">Landing Gear</text>
  <text x="620" y="444" text-anchor="middle" fill="#555" font-size="9">50 Hz PWM</text>

  <!-- ════════ Power ════════ -->
  <!-- Power rail -->
  <line x1="50" y1="476" x2="670" y2="476" stroke="#c0392b" stroke-width="0.75" stroke-dasharray="4 2"/>
  <line x1="100" y1="452" x2="100" y2="498" stroke="#c0392b" stroke-width="0.5" stroke-dasharray="2 2"/>
  <line x1="310" y1="452" x2="310" y2="498" stroke="#c0392b" stroke-width="0.5" stroke-dasharray="2 2"/>
  <line x1="490" y1="452" x2="490" y2="498" stroke="#c0392b" stroke-width="0.5" stroke-dasharray="2 2"/>
  <line x1="620" y1="452" x2="620" y2="498" stroke="#c0392b" stroke-width="0.5" stroke-dasharray="2 2"/>
  <text x="360" y="490" text-anchor="middle" fill="#c0392b" font-size="9" font-style="italic">5 V regulated rail</text>

  <!-- Battery -->
  <rect x="160" y="504" width="130" height="40" fill="#fdf2f0" stroke="#c0392b" stroke-width="1"/>
  <text x="225" y="524" text-anchor="middle" fill="#1a1a1a" font-size="11" font-weight="bold">LiPo Battery</text>
  <text x="225" y="538" text-anchor="middle" fill="#555" font-size="9">2S, 8.4 V nominal</text>

  <!-- Arrow battery → buck -->
  <line x1="290" y1="524" x2="358" y2="524" stroke="#c0392b" stroke-width="1"/>
  <polygon points="358,524 352,521 352,527" fill="#c0392b"/>
  <text x="324" y="518" text-anchor="middle" fill="#c0392b" font-size="8" font-style="italic">V_in</text>

  <!-- Buck Converter -->
  <rect x="360" y="504" width="160" height="40" fill="#fdf2f0" stroke="#c0392b" stroke-width="1"/>
  <text x="440" y="524" text-anchor="middle" fill="#1a1a1a" font-size="11" font-weight="bold">Buck Converter</text>
  <text x="440" y="538" text-anchor="middle" fill="#555" font-size="9">Output: 5 V / 3.3 V</text>

  <!-- Arrow buck → rail -->
  <line x1="440" y1="504" x2="440" y2="500" stroke="#c0392b" stroke-width="1"/>
  <polygon points="440,498 437,504 443,504" fill="#c0392b"/>
  <text x="456" y="502" fill="#c0392b" font-size="8" font-style="italic">V_out</text>

  <!-- Footer -->
  <line x1="50" y1="562" x2="670" y2="562" stroke="#ccc" stroke-width="0.5"/>
  <text x="360" y="576" text-anchor="middle" fill="#555" font-size="9">All three cogs execute concurrently; inter-cog communication occurs via shared hub RAM variables.</text>

</svg>
